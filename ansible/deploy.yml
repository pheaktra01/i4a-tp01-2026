- name: Deploy Laravel App
  hosts: web
  become: yes
  gather_facts: no

  tasks:
    - name: Bootstrap remote Python dependencies
      raw: apt-get update -y && apt-get install -y python3-six rsync

    - name: Sync project to server
      synchronize:
        src: "{{ workspace }}/"
        dest: /var/www/html/pheaktra/
        delete: yes
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=node_modules"

    - name: Install Composer dependencies
      raw: cd /var/www/html/pheaktra && composer install

    - name: Generate Laravel key
      raw: cd /var/www/html/pheaktra && php artisan key:generate

    - name: Run migrations
      raw: cd /var/www/html/pheaktra && php artisan migrate --force