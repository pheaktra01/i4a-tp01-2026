- name: Deploy Laravel App
  hosts: web
  become: yes
  gather_facts: no

  tasks:
    - name: Bootstrap remote Python dependencies
      raw: |
        set -e

        # ensure rsync is present
        if ! command -v rsync >/dev/null 2>&1; then
          if [ -f /etc/debian_version ]; then
            apt-get update -y
            apt-get install -y rsync
          elif command -v yum >/dev/null 2>&1; then
            yum install -y epel-release || true
            yum install -y rsync
          else
            echo "Unsupported distro: please install rsync manually" >&2
            exit 1
          fi
        fi

        # ensure Python 'six' package is available for Ansible module utils
        if ! python3 -c "import six" >/dev/null 2>&1; then
          if command -v pip3 >/dev/null 2>&1; then
            pip3 install --upgrade six
          else
            if [ -f /etc/debian_version ]; then
              apt-get update -y
              apt-get install -y python3-pip
              pip3 install --upgrade six
            elif command -v yum >/dev/null 2>&1; then
              yum install -y python3-pip || yum install -y python36-pip || true
              pip3 install --upgrade six
            else
              echo "Unsupported distro: please install python3-pip and six manually" >&2
              exit 1
            fi
          fi
        fi

    - name: Sync project to server
      synchronize:
        src: "{{ workspace }}/"
        dest: /var/www/html/pheaktra/
        delete: yes
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=node_modules"

    - name: Install Composer dependencies
      raw: cd /var/www/html/pheaktra && composer install

    - name: Generate Laravel key
      raw: cd /var/www/html/pheaktra && php artisan key:generate

    - name: Run migrations
      raw: cd /var/www/html/pheaktra && php artisan migrate --force